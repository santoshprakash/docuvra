<div class="annotation-toolbar" aria-label="Annotation tools">
  <div class="color-picker">
    <button
      class="tool-button color-trigger"
      type="button"
      title="Annotation color"
      aria-label="Annotation color"
      [attr.aria-expanded]="isColorPickerOpen"
      (click)="isColorPickerOpen = !isColorPickerOpen"
    >
      <svg lucidePalette size="18" aria-hidden="true"></svg>
      <span class="active-color" [style.background]="selectedColor"></span>
      <span class="tool-label">Color</span>
    </button>

    @if (isColorPickerOpen) {
      <div class="color-popover" aria-label="Annotation colors">
        <strong>Annotation color</strong>
        <div class="color-grid">
          @for (color of colors; track color.value) {
            <button
              class="color-button"
              type="button"
              [class.active]="color.value.toLowerCase() === selectedColor.toLowerCase()"
              [style.background]="color.value"
              [attr.aria-label]="color.label"
              [title]="color.label"
              (click)="selectColor(color.value)"
            ></button>
          }
        </div>
        <label class="custom-color">
          <span>Custom</span>
          <input type="color" [value]="selectedColor" (input)="selectColor($any($event.target).value)" />
        </label>
      </div>
    }
  </div>

  @for (item of tools; track item.tool) {
    <button
      class="tool-button"
      type="button"
      [class.active]="item.tool === activeTool"
      [attr.aria-pressed]="item.tool === activeTool"
      [attr.aria-label]="item.label"
      [title]="item.label"
      (click)="toolSelected.emit(item.tool)"
    >
      <span class="tool-icon" aria-hidden="true">
        @switch (item.tool) {
          @case ('SELECT') {
            <svg lucideMousePointer2 size="18"></svg>
          }
          @case ('HIGHLIGHT') {
            <svg lucideHighlighter size="18"></svg>
          }
          @case ('COMMENT') {
            <svg lucideMessageSquarePlus size="18"></svg>
          }
          @case ('RECTANGLE') {
            <svg lucideSquare size="18"></svg>
          }
          @case ('FREEHAND_DRAW') {
            <svg lucidePencil size="18"></svg>
          }
          @case ('UNDERLINE') {
            <svg lucideUnderline size="18"></svg>
          }
          @case ('STRIKE_THROUGH') {
            <svg lucideStrikethrough size="18"></svg>
          }
        }
      </span>
      <span class="tool-label">{{ item.label }}</span>
    </button>
  }

  <button
    class="tool-button danger"
    type="button"
    title="Delete selected annotation"
    aria-label="Delete selected annotation"
    [disabled]="!canDelete"
    (click)="deleteSelected.emit()"
  >
    <span class="tool-icon" aria-hidden="true">
      <svg lucideTrash2 size="18"></svg>
    </span>
    <span class="tool-label">Delete</span>
  </button>
</div>

<section class="password-shell">
  <form class="password-panel" (ngSubmit)="submit()">
    <div>
      <p>{{ isRequired ? 'Required before continuing' : 'Account security' }}</p>
      <h1>Change password</h1>
    </div>

    <label>
      Current password
      <input name="currentPassword" type="password" [(ngModel)]="currentPassword" autocomplete="current-password" required />
    </label>

    <label>
      New password
      <input name="newPassword" type="password" [(ngModel)]="newPassword" autocomplete="new-password" required minlength="8" />
    </label>

    <label>
      Confirm new password
      <input name="confirmPassword" type="password" [(ngModel)]="confirmPassword" autocomplete="new-password" required minlength="8" />
    </label>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }

    <button type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Saving...' : 'Save password' }}</button>
  </form>
</section>
